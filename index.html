<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard TV</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: black;
        overflow: hidden;
    }

    .grid {
        display: grid;
        grid-template-columns: 50% 50%;
        grid-template-rows: 50% 50%;
        height: 100vh;
        width: 100vw;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>

<script>
    // 🔄 Auto refresh cada 15 minutos (900000 ms)
    setInterval(function(){
        location.reload();
    }, 900000);
</script>

</head>

<body>

<div class="grid">

    <iframe src="https://app.powerbi.com/reportEmbed?reportId=013d5f56-f8d7-4ffc-886c-d6c7211a65c8&autoAuth=true&ctid=cef04b19-7776-4a94-b89b-375c77a8f936&pageName=ReportSection&navContentPaneEnabled=false&filterPaneEnabled=false"></iframe>
    <iframe src="https://app.powerbi.com/reportEmbed?reportId=c61c6dba-9b13-42e6-adc0-ae4bba8bce01&autoAuth=true&ctid=cef04b19-7776-4a94-b89b-375c77a8f936&pageName=ReportSection&navContentPaneEnabled=false&filterPaneEnabled=false"></iframe"></iframe>
    <iframe src="https://app.powerbi.com/reportEmbed?reportId=93f31544-c6cf-405b-bea0-0f952761be19&autoAuth=true&ctid=cef04b19-7776-4a94-b89b-375c77a8f936"></iframe>
    <iframe src="https://app.powerbi.com/reportEmbed?reportId=192d3db6-11df-458d-8eb2-e511c35d5b7c&autoAuth=true&ctid=cef04b19-7776-4a94-b89b-375c77a8f936"></iframe>

</div>

</body>
</html>
